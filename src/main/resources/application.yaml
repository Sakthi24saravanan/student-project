spring:
  application:
    name: jpa
  datasource:
    url: jdbc:h2:mem:mydb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
      properties:
        dialect: org.hibernate.dialect.H2Dialect
        show-sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
server:
  port: 8085